name: npm doctor

on:
  workflow_dispatch:

jobs:
  doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Who does the token authenticate as?
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "--- token present: $([ -n "$NODE_AUTH_TOKEN" ] && echo yes || echo NO) ---"
          echo "--- npm whoami ---"
          npm whoami || echo "whoami FAILED — token is not authenticating"
          echo "--- can it see the org? ---"
          npm org ls airstrings || echo "org ls FAILED"
          echo "--- existing package it should already have rights to ---"
          npm access list packages 2>&1 | head -20 || echo "access list FAILED"
